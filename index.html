<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GerObras — Sistema de Gerenciamento de Obras</title>
    <link rel="stylesheet" href="frontend/css/style.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(201,160,80,0.08), transparent 30%),
                radial-gradient(circle at bottom left, rgba(201,160,80,0.05), transparent 35%),
                #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .splash-box {
            position: relative;
            width: 480px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201,160,80,0.18);
            border-radius: 18px;
            padding: 55px 45px;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.55),
                0 0 25px rgba(201,160,80,0.08);
            animation: subir .6s ease;
        }

        .splash-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 30px;
            right: 30px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c9a050, transparent);
        }

        @keyframes subir {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulso {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .splash-icone {
            font-size: 4rem;
            margin-bottom: 18px;
            animation: pulso 1.8s ease-in-out infinite;
        }

        .splash-titulo {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
        }

        .splash-subtitulo {
            color: #9e9e9e;
            font-size: .95rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-entrar {
            display: inline-block;
            background: #c9a050;
            color: #121212;
            text-decoration: none;
            padding: 15px 32px;
            border-radius: 10px;
            font-weight: 700;
            transition: .25s;
        }

        .btn-entrar:hover {
            background: #ddb36a;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(201,160,80,0.25);
        }

        .rodape {
            margin-top: 28px;
            font-size: .78rem;
            color: #666;
            letter-spacing: 1px;
        }

        @media (max-width: 550px) {
            .splash-box {
                width: calc(100% - 30px);
                padding: 40px 28px;
            }

            .splash-titulo {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="splash-box">
    <div class="splash-icone">🏗️</div>

    <h1 class="splash-titulo">GerObras</h1>

    <p class="splash-subtitulo">
        Sistema híbrido para gerenciamento inteligente de obras,<br>
        organização de equipes e acompanhamento de tarefas.
    </p>

    <a href="frontend/paginas/login.html" class="btn-entrar">
        Entrar no Sistema →
    </a>

    <div class="rodape">
        GRUPO 12 • PROJETO INTEGRADOR
    </div>
</div>

<script>
    if (sessionStorage.getItem("usuario")) {
        window.location.href = "frontend/paginas/dashboard.html";
    }
</script>

</body>
</html>
